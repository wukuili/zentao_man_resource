abstract: 禅道项目走查（健康度体检）插件
# 描述和安装文档
desc: |
  禅道项目走查插件，自动扫描所有进行中项目，按 5 条规则筛出"失管"项目：无任务、任务近一周未更新、任务延期、无迭代/里程碑、任务持续时间超 2 周。一屏定位需要关注的项目，支持按问题类型筛选与导出。
install: |
  后台本地安装

