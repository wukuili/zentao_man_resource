# 基本信息。
name: 项目台账
code: taizhang
type: extension
copyright: 神思电子技术股份有限公司 2026
site: https://www.sdses.com
author: 李永杰
abstract: 禅道项目台账管理插件
# 描述和安装文档
desc: |
  禅道项目台账插件，统计所有项目的初始预估成本、已投入成本、当前预估成本及利润率等关键指标，支持按项目阶段、项目经理、研发经理筛选，超成本自动红色高亮告警，一屏掌握全部项目健康度。
install: |
  后台本地安装

# 版本信息。
releases:
  1.3.1:
    zentaoversion: 20.0+,biz10.0+,max5.0+,ipd2.0+
    charge: free
    changelog: 编辑表单中分包合同状态/开工资料是否齐全/安保措施是否到位/是否涉及危险作业改为仅项目类别为施工类/集成类时才显示，列表页中软件类项目这几列统一显示"-"；编辑表单移除近期项目成员手动填写项(该字段在列表页已自动按项目团队成员汇总展示)。
    date: 2026-06-16
  1.3:
    zentaoversion: 20.0+,biz10.0+,max5.0+,ipd2.0+
    charge: free
    changelog: 列表页筛选栏下方新增统计汇总框，展示当前筛选条件下全部数据(不受分页影响)的项目总数、人天/成本/金额合计及整体预估利润率。
    date: 2026-06-16
  1.2:
    zentaoversion: 20.0+,biz10.0+,max5.0+,ipd2.0+
    charge: free
    changelog: 表结构新增项目类别(施工类/软件类/集成类)、项目简介、合同签署时间、分包合同状态、工程状态、采购方式、供货单位、安装/施工单位、计划/实际开工日期、计划/实际完工日期、验收情况、安保措施是否到位、是否涉及危险作业、开工资料是否齐全、进度偏差说明、备注共18个字段(老库执行 db/upgrade_project_detail_columns.sql 升级)；列表新增项目类别筛选与对应列，编辑表单与导出同步支持全部新字段。
    date: 2026-06-16
  1.1:
    zentaoversion: 20.0+,biz10.0+,max5.0+,ipd2.0+
    charge: free
    changelog: 表结构新增外采金额(outsourcingAmount)、回款金额(receivedAmount)列(万元，老库执行 db/upgrade_amount_columns.sql 升级)；列表/编辑/导出展示两列金额；利润率计算扣除外采金额；支持由CRM对接插件(crmsync)自动同步填充合同金额与回款金额。
    date: 2026-06-12
  1.0:
    zentaoversion: 20.0+,biz10.0+,max5.0+,ipd2.0+
    charge: free
    changelog: 初始版本发布，支持项目台账增删改查、成本预警、利润率统计。
    date: 2026-06-08
