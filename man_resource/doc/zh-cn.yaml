code: man_resource
type: extension
copyright: 禅道软件（青岛）有限公司 2026
site: https://www.zentao.net
author: ZenTao
abstract: 禅道人力资源日历插件
# 描述和安装文档，可以多行，支持a, p, div, h3-h6, strong, img, table, tr, td, ol, ul, li, span标签。
desc: |
  禅道人力资源日历插件可以帮助项目管理者查看不同维度下的消耗工时、未完成工作量、并行工作量及负载率，同时组织维度待处理状态下实现了模拟负载的功能，帮助管理者详细了解成员的工作负载情况，更好的进行项目人力资源调度。
install: |
  后台本地安装
